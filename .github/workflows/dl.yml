name: ⬇️  01- Download from url

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of URLs to download'
        required: true
        type: string
      mode:
        description: 'Download mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: 'Password for zip files (optional)'
        required: false
        default: ''
        type: string

jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install aria2 and zip
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl

      - name: AVASAM Downloader - https://avasam.ir
        run: |
          echo "🏷️  AVASAM - Your Download Solution"
          echo "🌐 https://avasam.ir"
          echo ""

      - name: Download files
        run: |
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_THRESHOLD_MB=90
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          echo "AVASAM (https://avasam.ir) - Downloading with mode: $MODE"
          echo "Split threshold: $SPLIT_THRESHOLD_MB MB (automatic)"
          if [ -n "$ZIP_PASSWORD" ]; then
            echo "Password protection: ENABLED"
          else
            echo "Password protection: DISABLED"
          fi

          mkdir -p downloads tmp_downloads

          RANDOM_WORDS=("alpha" "beta" "gamma" "delta" "epsilon" "zeta" "theta" "kappa" "lambda" "sigma" "omega" "nova" "star" "moon" "sun" "sky" "cloud" "river" "ocean" "mountain")

          get_random_word() {
            echo "${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}_$RANDOM"
          }

          get_unique_folder() {
            local BASE_PATH="$1"
            local NAME="$2"
            if [ ! -d "$BASE_PATH/$NAME" ]; then
              echo "$NAME"
              return
            fi
            local RANDOM_SUFFIX=$(get_random_word)
            while [ -d "$BASE_PATH/${NAME}_${RANDOM_SUFFIX}" ]; do
              RANDOM_SUFFIX=$(get_random_word)
            done
            echo "${NAME}_${RANDOM_SUFFIX}"
          }

          get_unique_name() {
            local BASE_PATH="$1"
            local NAME="$2"
            local IS_DIR="$3"
            if [ "$IS_DIR" = "true" ]; then
              if [ ! -d "$BASE_PATH/$NAME" ]; then
                echo "$NAME"
                return
              fi
              local COUNTER=1
              while [ -d "$BASE_PATH/${NAME}_${COUNTER}" ]; do
                COUNTER=$((COUNTER + 1))
              done
              echo "${NAME}_${COUNTER}"
            else
              if [ ! -f "$BASE_PATH/$NAME" ]; then
                echo "$NAME"
                return
              fi
              local FILENAME="${NAME%.*}"
              local EXT="${NAME##*.}"
              if [ "$FILENAME" = "$NAME" ]; then
                EXT=""
              fi
              local COUNTER=1
              if [ -n "$EXT" ] && [ "$FILENAME" != "$EXT" ]; then
                while [ -f "$BASE_PATH/${FILENAME}_${COUNTER}.${EXT}" ]; do
                  COUNTER=$((COUNTER + 1))
                done
                echo "${FILENAME}_${COUNTER}.${EXT}"
              else
                while [ -f "$BASE_PATH/${NAME}_${COUNTER}" ]; do
                  COUNTER=$((COUNTER + 1))
                done
                echo "${NAME}_${COUNTER}"
              fi
            fi
          }

          create_error_file() {
            local FILENAME="$1"
            local ERROR_MSG="$2"
            local URL="$3"
            local BASENAME_NO_EXT="${FILENAME%.*}"
            local FOLDER_NAME=$(get_unique_folder "downloads" "$BASENAME_NO_EXT")
            mkdir -p "downloads/$FOLDER_NAME"
            {
              echo "========================================================"
              echo "  AVASAM Download Error Report"
              echo "  https://avasam.ir"
              echo "========================================================"
              echo ""
              echo "File: $FILENAME"
              echo "URL: $URL"
              echo "Date: $(date '+%Y-%m-%d %H:%M:%S UTC')"
              echo ""
              echo "ERROR:"
              echo "$ERROR_MSG"
              echo ""
              echo "========================================================"
              echo "  Possible Solutions:"
              echo "========================================================"
              echo "- Check if the URL is correct and accessible"
              echo "- The file may have been removed or moved"
              echo "- The server may require authentication"
              echo "- For SourceForge:
